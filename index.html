<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>幸福沙龙极简记录工具</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg: #f7f7f5;
      --panel: #ffffff;
      --soft: #f2f5f1;
      --line: #e4e5e0;
      --line-dark: #cfd3ca;
      --text: #1f241f;
      --muted: #6c726b;
      --accent: #24734d;
      --accent-soft: #e5f1ea;
      --warn: #9a6a1f;
      --warn-soft: #f6eddd;
      --radius: 8px;
      --font: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 210px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 20px 14px;
      border-right: 1px solid var(--line);
      background: #fbfbf9;
    }

    .brand {
      padding: 0 4px 16px;
      border-bottom: 1px solid var(--line);
    }

    .brand strong {
      display: block;
      font-size: 18px;
      letter-spacing: 0;
    }

    .brand span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .nav {
      display: grid;
      gap: 6px;
      margin-top: 16px;
    }

    .nav button,
    .mobile-nav button {
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
    }

    .nav button {
      min-height: 40px;
      padding: 8px 10px;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .nav button.active,
    .nav button:hover,
    .mobile-nav button.active {
      background: var(--accent-soft);
      border-color: #c7dfcf;
      color: var(--accent);
    }

    .nav small {
      color: inherit;
      opacity: 0.75;
    }

    .content {
      min-width: 0;
      padding: 20px;
    }

    .topbar {
      max-width: 1160px;
      margin: 0 auto 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .page-title h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .page-title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      min-height: 36px;
      border: 1px solid var(--line-dark);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      padding: 7px 12px;
      white-space: nowrap;
    }

    .btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .btn.ghost {
      background: transparent;
    }

    .section {
      display: none;
      max-width: 1160px;
      margin: 0 auto;
    }

    .section.active {
      display: block;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 0.72fr);
      gap: 12px;
      align-items: start;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      overflow: hidden;
    }

    .card-head {
      min-height: 42px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #fcfcfb;
    }

    .card-head h2 {
      margin: 0;
      font-size: 15px;
    }

    .card-head span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .card-body {
      padding: 12px;
    }

    .summary-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel);
    }

    .summary-item {
      min-width: 0;
      padding: 10px 12px;
      border-right: 1px solid var(--line);
      display: grid;
      gap: 2px;
    }

    .summary-item:last-child {
      border-right: 0;
    }

    .summary-item span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .summary-item strong {
      font-size: 20px;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .note {
      border-left: 3px solid var(--accent);
      background: var(--soft);
      padding: 10px 12px;
      border-radius: 0 var(--radius) var(--radius) 0;
      color: #3e4a40;
      font-size: 13px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label,
    .label {
      color: var(--muted);
      font-size: 12px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line-dark);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--text);
      padding: 8px 9px;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(36, 115, 77, 0.1);
    }

    textarea {
      min-height: 78px;
      resize: vertical;
    }

    .check-list {
      display: grid;
      gap: 6px;
    }

    .check-row {
      min-height: 38px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
    }

    .check-row input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: var(--accent);
    }

    .check-row strong {
      font-size: 13px;
    }

    .check-row small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tag {
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .tag.green {
      background: var(--accent-soft);
      border-color: #c7dfcf;
      color: var(--accent);
    }

    .tag.warn {
      background: var(--warn-soft);
      border-color: #ead7b9;
      color: var(--warn);
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 8px 9px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      background: #fafafa;
      font-size: 12px;
      font-weight: 700;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    td input,
    td select {
      min-width: 120px;
      padding: 6px 7px;
      font-size: 12px;
    }

    @media (max-width: 640px) {
      .table-wrap {
        overflow: visible;
        border: 0;
        background: transparent;
      }

      table {
        min-width: 0;
      }

      thead {
        display: none;
      }

      tbody {
        display: grid;
        gap: 8px;
      }

      tr {
        display: grid;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #ffffff;
        overflow: hidden;
      }

      td {
        min-width: 0;
        display: grid;
        grid-template-columns: 82px minmax(0, 1fr);
        gap: 8px;
        align-items: start;
        border-bottom: 1px solid var(--line);
      }

      td:last-child {
        border-bottom: 0;
      }

      td::before {
        content: attr(data-label);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      td input,
      td select {
        width: 100%;
        min-width: 0;
      }

      td .tag {
        justify-self: start;
        white-space: normal;
      }
    }

    .stage-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 12px 0 6px;
    }

    .stage-title:first-child {
      margin-top: 0;
    }

    .stage-title h3 {
      margin: 0;
      font-size: 14px;
    }

    .mini-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 50;
      min-width: 180px;
      border-radius: var(--radius);
      background: #1f241f;
      color: #ffffff;
      padding: 10px 12px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .mobile-nav {
      display: none;
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        padding: 12px 14px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        padding-bottom: 0;
        border-bottom: 0;
      }

      .nav {
        display: none;
      }

      .content {
        padding: 14px 12px 82px;
      }

      .topbar {
        flex-direction: column;
        gap: 10px;
      }

      .actions {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }

      .summary-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .summary-item:nth-child(2n) {
        border-right: 0;
      }

      .summary-item:nth-child(-n + 2) {
        border-bottom: 1px solid var(--line);
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .mobile-nav {
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: 10px;
        z-index: 40;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        padding: 6px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 10px 30px rgba(31, 36, 31, 0.12);
      }

      .mobile-nav button {
        min-height: 44px;
        padding: 5px 4px;
        font-size: 12px;
      }

      .toast {
        left: 14px;
        right: 14px;
        bottom: 74px;
      }
    }

    @media (max-width: 420px) {
      .page-title h1 {
        font-size: 21px;
      }

      .summary-row {
        grid-template-columns: 1fr;
      }

      .summary-item {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .summary-item:last-child {
        border-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <strong>幸福沙龙记录台</strong>
        <span>少填一点，重复做好一点</span>
      </div>
      <nav class="nav" aria-label="主导航">
        <button class="active" data-tab="overview" type="button"><span>总览</span><small>读数据</small></button>
        <button data-tab="record" type="button"><span>新建记录</span><small>录一场</small></button>
        <button data-tab="execute" type="button"><span>15步执行</span><small>照着做</small></button>
        <button data-tab="review" type="button"><span>复盘跟踪</span><small>看变化</small></button>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div class="page-title">
          <h1 id="pageTitle">总览</h1>
          <p id="pageSubtitle">只看最近场次、执行弱项和客户跟踪，不做复杂看板。</p>
        </div>
        <div class="actions">
          <button class="btn" data-tab-jump="record" type="button">新建沙龙</button>
          <button class="btn ghost" id="copyData" type="button">复制数据</button>
        </div>
      </header>

      <section id="overview" class="section active">
        <div class="stack">
          <div class="summary-row" id="summaryRow"></div>

          <div class="grid-2">
            <article class="card">
              <div class="card-head">
                <h2>最近沙龙</h2>
                <span>一眼看进度</span>
              </div>
              <div class="card-body">
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>日期</th>
                        <th>主题</th>
                        <th>执行人</th>
                        <th>人数</th>
                        <th>最弱步骤</th>
                        <th>下次动作</th>
                      </tr>
                    </thead>
                    <tbody id="recentRecords"></tbody>
                  </table>
                </div>
              </div>
            </article>

            <article class="card">
              <div class="card-head">
                <h2>今天只盯三件事</h2>
                <span>少而准</span>
              </div>
              <div class="card-body stack">
                <div class="note">开前先通关：流程、主题、问题、关键问句、作业收回方式。</div>
                <div class="note">开中少讲多问：让参与者说出自己的发现，而不是执行人讲很多道理。</div>
                <div class="note">开后马上复盘：做对什么，哪里没按标准，下一场重复训练什么。</div>
              </div>
            </article>
          </div>
        </div>
      </section>

      <section id="record" class="section">
        <div class="grid-2">
          <article class="card">
            <div class="card-head">
              <h2>沙龙记录</h2>
              <span>一场只填核心信息</span>
            </div>
            <div class="card-body">
              <form class="form-grid" id="recordForm">
                <div class="field">
                  <label for="recordDate">日期时间</label>
                  <input id="recordDate" type="datetime-local">
                </div>
                <div class="field">
                  <label for="recordOwner">执行人</label>
                  <input id="recordOwner" type="text" placeholder="例如：王姐">
                </div>
                <div class="field">
                  <label for="recordTheme">沙龙主题</label>
                  <input id="recordTheme" type="text" placeholder="例如：语气 / 角度 / 亲子沟通">
                </div>
                <div class="field">
                  <label for="recordCount">到场人数</label>
                  <input id="recordCount" type="number" min="0" placeholder="例如：3">
                </div>
                <div class="field">
                  <label for="recordSource">主要来源</label>
                  <select id="recordSource">
                    <option>首次咨询</option>
                    <option>转介绍</option>
                    <option>老学员带来</option>
                    <option>社群邀约</option>
                  </select>
                </div>
                <div class="field">
                  <label for="recordPass">开前通关</label>
                  <select id="recordPass">
                    <option>已通关</option>
                    <option>需演练</option>
                    <option>未通关</option>
                  </select>
                </div>
                <div class="field">
                  <label for="recordWeak">最弱步骤</label>
                  <select id="recordWeak"></select>
                </div>
                <div class="field">
                  <label for="recordStandard">标准执行</label>
                  <select id="recordStandard">
                    <option>基本按标准</option>
                    <option>部分按标准</option>
                    <option>偏离较多</option>
                  </select>
                </div>
                <div class="field full">
                  <label for="recordNext">下一场只改一个动作</label>
                  <textarea id="recordNext" placeholder="例如：采访讨论少讲多问，提前准备3个对比问题。"></textarea>
                </div>
                <div class="field full">
                  <button class="btn primary" type="submit">保存沙龙记录</button>
                </div>
              </form>
            </div>
          </article>

          <article class="card">
            <div class="card-head">
              <h2>开前通关</h2>
              <span>开始前确认</span>
            </div>
            <div class="card-body">
              <div class="check-list" id="precheckList"></div>
              <div class="mini-actions">
                <button class="btn" id="precheckAll" type="button">全部完成</button>
                <button class="btn ghost" id="precheckClear" type="button">清空</button>
              </div>
            </div>
          </article>
        </div>
      </section>

      <section id="execute" class="section">
        <article class="card">
          <div class="card-head">
            <h2>15步执行清单</h2>
            <span><span id="stepDone">0</span>/15 已勾选</span>
          </div>
          <div class="card-body">
            <div id="stepList"></div>
            <div class="mini-actions">
              <button class="btn primary" id="stepsAll" type="button">本场全部完成</button>
              <button class="btn ghost" id="stepsClear" type="button">重新勾选</button>
            </div>
          </div>
        </article>
      </section>

      <section id="review" class="section">
        <div class="grid-2">
          <article class="card">
            <div class="card-head">
              <h2>复盘</h2>
              <span>三句话即可</span>
            </div>
            <div class="card-body stack">
              <div class="form-grid">
                <div class="field">
                  <label for="reviewDone">15步完成</label>
                  <select id="reviewDone">
                    <option>15/15</option>
                    <option>14/15</option>
                    <option>13/15及以下</option>
                  </select>
                </div>
                <div class="field">
                  <label for="reviewKey">关键标准</label>
                  <select id="reviewKey">
                    <option>7/9以上</option>
                    <option>5-6/9</option>
                    <option>4/9以下</option>
                  </select>
                </div>
                <div class="field full">
                  <label for="reviewRight">这次做对了什么</label>
                  <input id="reviewRight" type="text" placeholder="例如：发心开场更自然，问题采集更具体。">
                </div>
                <div class="field full">
                  <label for="reviewMiss">哪里没有按标准</label>
                  <input id="reviewMiss" type="text" placeholder="例如：采访讨论讲多了，参与者说得少。">
                </div>
                <div class="field full">
                  <label for="reviewTrain">下一场重复训练</label>
                  <input id="reviewTrain" type="text" placeholder="例如：少讲多问，准备3个对比问题。">
                </div>
              </div>

              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>关键步骤</th>
                      <th>判断</th>
                      <th>下次动作</th>
                    </tr>
                  </thead>
                  <tbody id="standardRows"></tbody>
                </table>
              </div>
            </div>
          </article>

          <article class="card">
            <div class="card-head">
              <h2>客户跟踪</h2>
              <span>只记变化和下一步</span>
            </div>
            <div class="card-body stack">
              <form class="form-grid" id="customerForm">
                <div class="field">
                  <label for="customerName">姓名</label>
                  <input id="customerName" type="text" placeholder="例如：陈姐">
                </div>
                <div class="field">
                  <label for="customerSource">来源</label>
                  <select id="customerSource">
                    <option>首次来</option>
                    <option>转介绍</option>
                    <option>老学员</option>
                  </select>
                </div>
                <div class="field full">
                  <label for="customerProblem">原问题</label>
                  <input id="customerProblem" type="text" placeholder="例如：和孩子一说话就急。">
                </div>
                <div class="field full">
                  <label for="customerChange">看到的变化</label>
                  <input id="customerChange" type="text" placeholder="例如：愿意今晚换一种语气试一次。">
                </div>
                <div class="field full">
                  <label for="customerNext">下一步跟踪</label>
                  <input id="customerNext" type="text" placeholder="例如：明晚收作业，问一句实际反馈。">
                </div>
                <div class="field full">
                  <button class="btn primary" type="submit">添加跟踪</button>
                </div>
              </form>

              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>姓名</th>
                      <th>来源</th>
                      <th>原问题</th>
                      <th>变化</th>
                      <th>下一步</th>
                    </tr>
                  </thead>
                  <tbody id="customerRows"></tbody>
                </table>
              </div>
            </div>
          </article>
        </div>
      </section>
    </main>
  </div>

  <nav class="mobile-nav" aria-label="手机导航">
    <button class="active" data-tab="overview" type="button">总览</button>
    <button data-tab="record" type="button">记录</button>
    <button data-tab="execute" type="button">执行</button>
    <button data-tab="review" type="button">复盘</button>
  </nav>

  <div class="toast" id="toast">已保存</div>

  <script>
    const tabs = document.querySelectorAll("[data-tab]");
    const sections = document.querySelectorAll(".section");
    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");
    const toast = document.getElementById("toast");

    const meta = {
      overview: ["总览", "只看最近场次、执行弱项和客户跟踪，不做复杂看板。"],
      record: ["新建记录", "一场沙龙只填核心信息，方便后面复盘和辅导。"],
      execute: ["15步执行", "按标准逐步勾选，执行人不用临场想流程。"],
      review: ["复盘跟踪", "复盘看是否按标准，跟踪看客户有没有行动变化。"]
    };

    const precheckItems = [
      ["流程熟悉", "15步能按顺序说清"],
      ["主题明确", "本场只讲一个主题"],
      ["问题采集", "知道参与者最想解决什么"],
      ["关键问句", "准备好采访讨论的问题"],
      ["作业收回", "明确什么时候收、收什么"]
    ];

    const stages = [
      {
        name: "会前",
        steps: [
          ["激活", "让对方对内容好奇"],
          ["破担心", "让对方无压力参加"],
          ["排队", "建立预约和用心参与"],
          ["提要求", "提前调整参与心态"],
          ["问题采集", "收集真实困惑和具体场景"]
        ]
      },
      {
        name: "会中",
        steps: [
          ["发心开场", "说明为什么开这场沙龙"],
          ["自我介绍", "每个人说清来学习的原因"],
          ["主题", "只围绕本场主题互动"],
          ["采访讨论", "用对比发问引导发现"],
          ["结论", "把主题背后的规律讲清"],
          ["行动改变", "激发下一步学习和行动"],
          ["拔高", "回到心愿和帮助别人"],
          ["布置作业", "作业要可行动、可收回"]
        ]
      },
      {
        name: "会后",
        steps: [
          ["收作业", "按约定收反馈"],
          ["榜样采访", "发现有变化的人"]
        ]
      }
    ];

    const keySteps = ["激活", "破担心", "排队", "提要求", "问题采集", "采访讨论", "结论", "行动改变", "布置作业/收作业"];

    const defaultRecords = [
      {
        date: "2026-07-13 19:30",
        theme: "语气沙龙",
        owner: "王姐",
        count: "3",
        source: "转介绍",
        pass: "需演练",
        weak: "采访讨论",
        standard: "部分按标准",
        next: "少讲多问，提前准备3个对比问题"
      }
    ];

    const defaultCustomers = [
      {
        name: "陈姐",
        source: "首次来",
        problem: "和孩子说话容易急",
        change: "愿意今晚先换一句语气",
        next: "明晚收作业"
      }
    ];

    function readStore(key, fallback) {
      try {
        return JSON.parse(localStorage.getItem(key)) || fallback;
      } catch {
        return fallback;
      }
    }

    function writeStore(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    let records = readStore("xfSalonRecords", defaultRecords);
    let customers = readStore("xfSalonCustomers", defaultCustomers);

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1600);
    }

    function switchTab(tab) {
      tabs.forEach((button) => button.classList.toggle("active", button.dataset.tab === tab));
      sections.forEach((section) => section.classList.toggle("active", section.id === tab));
      pageTitle.textContent = meta[tab][0];
      pageSubtitle.textContent = meta[tab][1];
    }

    function formatDateForInput(date) {
      const pad = (value) => String(value).padStart(2, "0");
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function formatDate(dateText) {
      if (!dateText) return "未填";
      return dateText.replace("T", " ").slice(0, 16);
    }

    function renderSummary() {
      const latest = records[0] || {};
      const totalPeople = records.reduce((sum, item) => sum + Number(item.count || 0), 0);
      const avgPeople = records.length ? Math.round(totalPeople / records.length) : 0;
      const items = [
        ["总场次", records.length || 0],
        ["平均到场", avgPeople],
        ["最近弱项", latest.weak || "未记录"],
        ["跟踪客户", customers.length || 0]
      ];

      document.getElementById("summaryRow").innerHTML = items.map(([label, value]) => `
        <div class="summary-item">
          <span>${label}</span>
          <strong>${value}</strong>
        </div>
      `).join("");

      document.getElementById("recentRecords").innerHTML = records.slice(0, 8).map((item) => `
        <tr>
          <td data-label="日期">${formatDate(item.date)}</td>
          <td data-label="主题">${item.theme || "未填"}</td>
          <td data-label="执行人">${item.owner || "未填"}</td>
          <td data-label="人数">${item.count || "0"}</td>
          <td data-label="弱项"><span class="tag warn">${item.weak || "未选"}</span></td>
          <td data-label="下次动作">${item.next || "未填"}</td>
        </tr>
      `).join("");
    }

    function renderPrecheck() {
      document.getElementById("precheckList").innerHTML = precheckItems.map(([name, note], index) => `
        <label class="check-row">
          <input type="checkbox" data-precheck="${index}">
          <span>
            <strong>${index + 1}. ${name}</strong>
            <small>${note}</small>
          </span>
          <span class="tag">通关</span>
        </label>
      `).join("");
    }

    function renderSteps() {
      const html = stages.map((stage) => `
        <div class="stage-title">
          <h3>${stage.name}</h3>
          <span class="tag">${stage.steps.length}步</span>
        </div>
        <div class="check-list">
          ${stage.steps.map(([name, note]) => `
            <label class="check-row">
              <input type="checkbox" class="step-check" data-step="${name}">
              <span>
                <strong>${name}</strong>
                <small>${note}</small>
              </span>
              <span class="tag ${keySteps.some((key) => key.includes(name) || name.includes(key)) ? "green" : ""}">
                ${keySteps.some((key) => key.includes(name) || name.includes(key)) ? "关键" : "执行"}
              </span>
            </label>
          `).join("")}
        </div>
      `).join("");

      document.getElementById("stepList").innerHTML = html;
      document.querySelectorAll(".step-check").forEach((box) => box.addEventListener("change", updateStepCount));
      updateStepCount();
    }

    function updateStepCount() {
      document.getElementById("stepDone").textContent = document.querySelectorAll(".step-check:checked").length;
    }

    function renderWeakOptions() {
      document.getElementById("recordWeak").innerHTML = keySteps.map((step) => `<option>${step}</option>`).join("");
    }

    function renderStandards() {
      document.getElementById("standardRows").innerHTML = keySteps.map((step) => `
        <tr>
          <td data-label="关键步骤"><strong>${step}</strong></td>
          <td data-label="判断">
            <select aria-label="${step}判断">
              <option>做到</option>
              <option selected>部分</option>
              <option>未做</option>
            </select>
          </td>
          <td data-label="下次动作"><input type="text" placeholder="下一场只改一个动作"></td>
        </tr>
      `).join("");
    }

    function renderCustomers() {
      document.getElementById("customerRows").innerHTML = customers.slice(0, 10).map((item) => `
        <tr>
          <td data-label="姓名">${item.name || "未填"}</td>
          <td data-label="来源">${item.source || "未填"}</td>
          <td data-label="原问题">${item.problem || "未填"}</td>
          <td data-label="变化">${item.change || "未填"}</td>
          <td data-label="下一步">${item.next || "未填"}</td>
        </tr>
      `).join("");
    }

    document.querySelectorAll("[data-tab-jump]").forEach((button) => {
      button.addEventListener("click", () => switchTab(button.dataset.tabJump));
    });

    tabs.forEach((button) => {
      button.addEventListener("click", () => switchTab(button.dataset.tab));
    });

    document.getElementById("recordDate").value = formatDateForInput(new Date());

    document.getElementById("recordForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const item = {
        date: document.getElementById("recordDate").value,
        theme: document.getElementById("recordTheme").value.trim(),
        owner: document.getElementById("recordOwner").value.trim(),
        count: document.getElementById("recordCount").value.trim(),
        source: document.getElementById("recordSource").value,
        pass: document.getElementById("recordPass").value,
        weak: document.getElementById("recordWeak").value,
        standard: document.getElementById("recordStandard").value,
        next: document.getElementById("recordNext").value.trim()
      };
      records = [item, ...records].slice(0, 50);
      writeStore("xfSalonRecords", records);
      renderSummary();
      showToast("沙龙记录已保存");
      switchTab("overview");
    });

    document.getElementById("customerForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const item = {
        name: document.getElementById("customerName").value.trim(),
        source: document.getElementById("customerSource").value,
        problem: document.getElementById("customerProblem").value.trim(),
        change: document.getElementById("customerChange").value.trim(),
        next: document.getElementById("customerNext").value.trim()
      };
      customers = [item, ...customers].slice(0, 80);
      writeStore("xfSalonCustomers", customers);
      renderCustomers();
      renderSummary();
      event.target.reset();
      showToast("客户跟踪已添加");
    });

    document.getElementById("precheckAll").addEventListener("click", () => {
      document.querySelectorAll("[data-precheck]").forEach((box) => { box.checked = true; });
      showToast("开前通关已勾选");
    });

    document.getElementById("precheckClear").addEventListener("click", () => {
      document.querySelectorAll("[data-precheck]").forEach((box) => { box.checked = false; });
    });

    document.getElementById("stepsAll").addEventListener("click", () => {
      document.querySelectorAll(".step-check").forEach((box) => { box.checked = true; });
      updateStepCount();
      showToast("15步已勾选");
    });

    document.getElementById("stepsClear").addEventListener("click", () => {
      document.querySelectorAll(".step-check").forEach((box) => { box.checked = false; });
      updateStepCount();
    });

    document.getElementById("copyData").addEventListener("click", async () => {
      const data = JSON.stringify({ records, customers }, null, 2);
      try {
        await navigator.clipboard.writeText(data);
        showToast("数据已复制");
      } catch {
        showToast("复制失败，可稍后重试");
      }
    });

    renderWeakOptions();
    renderPrecheck();
    renderSteps();
    renderStandards();
    renderCustomers();
    renderSummary();
  </script>
</body>
</html>
