name: Sync Pages HTML

on:
  push:
    paths:
      - .github/workflows/sync-pages-html.yml
      - sync-trigger.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download latest HTML
        run: curl -L --fail --retry 5 -o index.html "https://meditation-basin-education-civic.trycloudflare.com/mobile.html"
      - name: Commit updated page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Update minimalist salon tool"
          git push
